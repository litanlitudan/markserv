<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<title>{{title}}</title>
	<meta charset="utf-8">
	<link rel="stylesheet" href="{markserv}templates/markserv.css">
	<link rel="stylesheet" href="{markserv}templates/highlight-js-github-gist.css">
	<script type="text/javascript" id="MathJax-script" async
	      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
	       </script>
	<script src="https://cdn.jsdelivr.net/npm/mermaid@10.6.1/dist/mermaid.min.js"></script>
	<style>
		.download-link {
			color: #0366d6;
			text-decoration: none;
		}
		.download-link:hover {
			text-decoration: underline;
		}
		footer sup {
			line-height: 1.6;
		}
	</style>
</head>
<body>
<article class="markdown-body">
{{{content}}}
<footer><sup><hr> <a href="{{filePath}}?download=true" class="download-link" download="{{fileName}}">⬇ Download</a> &nbsp;|&nbsp; Last Modified: {{lastModified}} &nbsp;|&nbsp; PID: {{pid}}</sup></footer>
</article>
<script>
	document.addEventListener('DOMContentLoaded', function() {
		mermaid.initialize({
			startOnLoad: true,
			theme: 'default',
			securityLevel: 'loose'
		});
	});
</script>
</body>
</html>
