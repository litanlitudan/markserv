<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Model Explorer - {{filename}}</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: 'Google Sans Text', 'Roboto', Arial, sans-serif;
			background: #1a1a1a;
			color: #e0e0e0;
			overflow: hidden;
		}

		.header {
			background: #2d2d2d;
			padding: 12px 20px;
			border-bottom: 1px solid #404040;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.header h1 {
			font-size: 18px;
			font-weight: 500;
			color: #fff;
			display: flex;
			align-items: center;
			gap: 12px;
		}

		.header .icon {
			width: 24px;
			height: 24px;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			border-radius: 4px;
			display: flex;
			align-items: center;
			justify-content: center;
			font-weight: bold;
			color: white;
			font-size: 14px;
		}

		.filename {
			font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
			color: #9ca3af;
			font-size: 14px;
		}

		.controls {
			display: flex;
			gap: 12px;
			align-items: center;
		}

		.btn {
			padding: 6px 12px;
			background: #404040;
			border: 1px solid #505050;
			border-radius: 4px;
			color: #e0e0e0;
			font-size: 13px;
			cursor: pointer;
			transition: all 0.2s;
		}

		.btn:hover {
			background: #505050;
			border-color: #606060;
		}

		.visualizer-container {
			position: fixed;
			top: 50px;
			left: 0;
			right: 0;
			bottom: 0;
			background: #1a1a1a;
		}

		model-explorer-visualizer {
			width: 100%;
			height: 100%;
			display: block;
		}

		.loading {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			text-align: center;
		}

		.spinner {
			width: 50px;
			height: 50px;
			border: 4px solid #404040;
			border-top-color: #667eea;
			border-radius: 50%;
			animation: spin 1s linear infinite;
			margin: 0 auto 16px;
		}

		@keyframes spin {
			to { transform: rotate(360deg); }
		}

		.error {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			background: #2d2d2d;
			padding: 24px;
			border-radius: 8px;
			border: 1px solid #f87171;
			max-width: 500px;
		}

		.error-title {
			color: #f87171;
			font-size: 16px;
			font-weight: 500;
			margin-bottom: 12px;
		}

		.error-message {
			color: #9ca3af;
			font-size: 14px;
			line-height: 1.5;
		}
	</style>
</head>
<body>
	<div class="header">
		<h1>
			<div class="icon">ME</div>
			<span>Model Explorer</span>
			<span class="filename">{{filename}}</span>
		</h1>
		<div class="controls">
			<button class="btn" onclick="window.location.href='{{backUrl}}'">← Back</button>
			<button class="btn" onclick="window.location.reload()">Refresh</button>
		</div>
	</div>

	<div class="visualizer-container">
		<div class="loading" id="loading">
			<div class="spinner"></div>
			<div>Loading MLIR model...</div>
		</div>
		<div class="error" id="error" style="display: none;">
			<div class="error-title">Error Loading Model</div>
			<div class="error-message" id="error-message"></div>
		</div>
	</div>

	<!-- Load Model Explorer from local files -->
	<script src="/lib/model-explorer/main_browser.js"></script>

	<script id="graph-data" type="application/json">{{graphData}}</script>

	<script>
		// Configure Model Explorer paths to use local files
		if (window.modelExplorer) {
			window.modelExplorer.workerScriptPath = '/lib/model-explorer/worker.js';
			window.modelExplorer.assetFilesBaseUrl = '/lib/model-explorer/static_files';
		}

		// Parse graph data from JSON script tag
		const graphDataElement = document.getElementById('graph-data');
		const graphData = JSON.parse(graphDataElement.textContent);

		async function loadMLIRModel() {
			try {
				// Validate graph data
				if (!graphData) {
					throw new Error('Graph data is null or undefined');
				}

				if (!graphData.nodes || !Array.isArray(graphData.nodes)) {
					throw new Error('Graph data.nodes is missing or not an array');
				}

				if (graphData.nodes.length === 0) {
					throw new Error('No graph nodes found in MLIR file');
				}

				// Create and configure the visualizer
				const visualizer = document.createElement('model-explorer-visualizer');

				// Set graph collections with proper structure
				const graphCollections = [{
					label: '{{filename}}',
					graphs: [graphData]
				}];

				visualizer.graphCollections = graphCollections;

				// Configure visualizer - minimal config
				visualizer.config = {};

				// Add to DOM
				const container = document.querySelector('.visualizer-container');
				container.appendChild(visualizer);

				// Hide loading after allowing time to render
				setTimeout(() => {
					document.getElementById('loading').style.display = 'none';
				}, 1000);

			} catch (error) {
				console.error('Error loading MLIR model:', error);
				document.getElementById('loading').style.display = 'none';
				const errorDiv = document.getElementById('error');
				errorDiv.style.display = 'block';
				document.getElementById('error-message').textContent = error.message;
			}
		}

		// Wait for Model Explorer custom element to be defined
		if (customElements.get('model-explorer-visualizer')) {
			setTimeout(loadMLIRModel, 100);
		} else {
			customElements.whenDefined('model-explorer-visualizer').then(() => {
				setTimeout(loadMLIRModel, 100);
			});
		}
	</script>
</body>
</html>
